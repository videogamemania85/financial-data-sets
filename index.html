<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KOSPI 대시보드</title>
  <link href='/style.css' rel='stylesheet'>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="app">
    <header class="header">
      <h1 class="logo">KOSPI 대시보드</h1>
    </header>

    <!-- 시장 지수 -->
    <section class="market-overview">
      <div class="market-header">
        <h2 class="market-title">시장 지수</h2>
        <span id="marketUpdateTime" class="update-time">—</span>
        <button id="refreshBtn" class="refresh-btn" title="새로고침">&#8635;</button>
      </div>
      <div class="index-grid">
        <div class="index-card" id="idx-KS11">
          <div class="index-name">KOSPI</div>
          <div class="index-price">—</div>
          <div class="index-change">—</div>
          <div class="index-range">—</div>
          <canvas class="sparkline"></canvas>
        </div>
        <div class="index-card" id="idx-KQ11">
          <div class="index-name">KOSDAQ</div>
          <div class="index-price">—</div>
          <div class="index-change">—</div>
          <div class="index-range">—</div>
          <canvas class="sparkline"></canvas>
        </div>
        <div class="index-card" id="idx-IXIC">
          <div class="index-name">NASDAQ</div>
          <div class="index-price">—</div>
          <div class="index-change">—</div>
          <div class="index-range">—</div>
          <canvas class="sparkline"></canvas>
        </div>
        <div class="index-card" id="idx-GSPC">
          <div class="index-name">S&amp;P 500</div>
          <div class="index-price">—</div>
          <div class="index-change">—</div>
          <div class="index-range">—</div>
          <canvas class="sparkline"></canvas>
        </div>
      </div>
    </section>

    <!-- KOSPI 전종목 -->
    <section class="stock-section">
      <div class="stock-header">
        <div class="stock-title-row">
          <h2 class="stock-title">KOSPI 전종목</h2>
          <span id="stockUpdateTime" class="update-time">—</span>
          <button id="stockRefreshBtn" class="refresh-btn" title="새로고침">&#8635;</button>
        </div>
        <div class="stock-controls">
          <input type="text" id="stockSearch" class="stock-search" placeholder="종목명 또는 종목코드 검색..." />
          <span class="stock-count" id="stockCount"></span>
        </div>
      </div>
      <div id="stockError" class="error hidden"></div>
      <div class="table-wrap">
        <table id="stockTable">
          <thead>
            <tr>
              <th class="sortable" data-col="ISU_SRT_CD">종목코드</th>
              <th class="sortable" data-col="ISU_ABBRV">종목명</th>
              <th class="sortable th-num" data-col="TDD_CLSPRC">현재가</th>
              <th class="sortable th-num" data-col="CMPPREVDD_PRC">전일비</th>
              <th class="sortable th-num" data-col="FLUC_RT">등락률</th>
              <th class="sortable th-num" data-col="ACC_TRDVOL">거래량</th>
              <th class="sortable th-num" data-col="ACC_TRDVAL">거래대금</th>
              <th class="sortable th-num" data-col="MKTCAP">시가총액</th>
            </tr>
          </thead>
          <tbody id="stockTableBody">
            <tr><td colspan="8" class="table-placeholder">데이터 로딩 중...</td></tr>
          </tbody>
        </table>
      </div>
      <div class="pagination" id="pagination"></div>
    </section>
  </div>

  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
