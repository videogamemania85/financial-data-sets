<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Financial Dashboard</title>
  <link href='/style.css' rel='stylesheet'>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="app">
    <header class="header">
      <h1 class="logo">Financial Dashboard</h1>
      <div class="search-bar">
        <input type="text" id="tickerInput" placeholder="Enter ticker (e.g. AAPL, MSFT, TSLA)" />
        <button id="searchBtn">Search</button>
      </div>
    </header>

    <main class="main" id="main">
      <div id="loading" class="loading hidden">Loading...</div>
      <div id="error" class="error hidden"></div>

      <!-- Company Info -->
      <section class="card company-card" id="companySection">
        <div class="company-header">
          <div>
            <h2 id="companyName">—</h2>
            <span id="companyTicker" class="badge">—</span>
            <span id="companyExchange" class="badge badge-gray">—</span>
          </div>
          <div class="price-block">
            <span id="stockPrice" class="price">—</span>
            <span id="stockChange" class="change">—</span>
          </div>
        </div>
        <div class="company-meta">
          <div class="meta-item"><span class="meta-label">Sector</span><span id="companySector">—</span></div>
          <div class="meta-item"><span class="meta-label">Industry</span><span id="companyIndustry">—</span></div>
          <div class="meta-item"><span class="meta-label">Location</span><span id="companyLocation">—</span></div>
          <div class="meta-item"><span class="meta-label">Status</span><span id="companyStatus">—</span></div>
        </div>
      </section>

      <!-- Key Metrics -->
      <section class="metrics-grid" id="metricsSection">
        <div class="card metric-card">
          <span class="metric-label">Revenue (Latest)</span>
          <span class="metric-value" id="metricRevenue">—</span>
        </div>
        <div class="card metric-card">
          <span class="metric-label">Net Income (Latest)</span>
          <span class="metric-value" id="metricNetIncome">—</span>
        </div>
        <div class="card metric-card">
          <span class="metric-label">EPS (Diluted)</span>
          <span class="metric-value" id="metricEPS">—</span>
        </div>
        <div class="card metric-card">
          <span class="metric-label">Gross Profit Margin</span>
          <span class="metric-value" id="metricGrossMargin">—</span>
        </div>
      </section>

      <!-- Charts -->
      <section class="charts-grid">
        <div class="card">
          <h3>Revenue (Annual)</h3>
          <canvas id="revenueChart"></canvas>
        </div>
        <div class="card">
          <h3>Net Income (Annual)</h3>
          <canvas id="netIncomeChart"></canvas>
        </div>
      </section>

      <!-- Income Statement Table -->
      <section class="card" id="tableSection">
        <h3>Income Statement</h3>
        <div class="table-wrap">
          <table id="incomeTable">
            <thead>
              <tr>
                <th>Period</th>
                <th>Revenue</th>
                <th>Gross Profit</th>
                <th>Operating Income</th>
                <th>Net Income</th>
                <th>EPS</th>
              </tr>
            </thead>
            <tbody id="incomeTableBody"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
