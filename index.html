<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KRX Market Data</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link href='/style.css' rel='stylesheet'>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <!-- 상단 상태 바 -->
  <div class="topbar">
    <div class="topbar-inner">
      <span class="topbar-brand">KRX MARKET DATA</span>
      <div class="topbar-right">
        <span class="market-status" id="marketStatus">
          <span class="status-dot" id="statusDot"></span>
          <span id="statusText">—</span>
        </span>
        <span class="topbar-divider"></span>
        <span class="topbar-clock" id="topbarClock">—</span>
      </div>
    </div>
  </div>

  <div class="app">

    <!-- 헤더 -->
    <header class="header">
      <div class="header-left">
        <h1 class="logo">KOSPI <span class="logo-sub">대시보드</span></h1>
        <span class="header-date" id="headerDate">—</span>
      </div>
    </header>

    <!-- 시장 지수 -->
    <section class="market-overview">
      <div class="section-header">
        <h2 class="section-title">시장 지수</h2>
        <div class="section-actions">
          <span id="marketUpdateTime" class="update-time">—</span>
          <button id="refreshBtn" class="icon-btn" title="새로고침">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
              <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="index-grid">
        <div class="index-card" id="idx-KS11">
          <div class="index-label">KOSPI</div>
          <div class="index-price mono">—</div>
          <div class="index-change">—</div>
          <div class="index-range">—</div>
          <canvas class="sparkline"></canvas>
        </div>
        <div class="index-card" id="idx-KQ11">
          <div class="index-label">KOSDAQ</div>
          <div class="index-price mono">—</div>
          <div class="index-change">—</div>
          <div class="index-range">—</div>
          <canvas class="sparkline"></canvas>
        </div>
        <div class="index-card" id="idx-IXIC">
          <div class="index-label">NASDAQ</div>
          <div class="index-price mono">—</div>
          <div class="index-change">—</div>
          <div class="index-range">—</div>
          <canvas class="sparkline"></canvas>
        </div>
        <div class="index-card" id="idx-GSPC">
          <div class="index-label">S&amp;P 500</div>
          <div class="index-price mono">—</div>
          <div class="index-change">—</div>
          <div class="index-range">—</div>
          <canvas class="sparkline"></canvas>
        </div>
      </div>
    </section>

    <!-- KOSPI 전종목 -->
    <section class="stock-section">
      <div class="section-header">
        <div class="section-header-left">
          <h2 class="section-title">KOSPI 전종목</h2>
          <span class="stock-count badge" id="stockCount"></span>
        </div>
        <div class="section-actions">
          <span id="stockUpdateTime" class="update-time">—</span>
          <button id="stockRefreshBtn" class="icon-btn" title="새로고침">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
              <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="search-bar-wrap">
        <div class="search-input-wrap">
          <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" id="stockSearch" class="stock-search" placeholder="종목명 또는 종목코드 검색" autocomplete="off" />
        </div>
      </div>

      <div id="stockError" class="error-msg hidden"></div>

      <div class="table-wrap">
        <table id="stockTable">
          <thead>
            <tr>
              <th class="sortable th-code"  data-col="code">종목코드 <span class="sort-icon"></span></th>
              <th class="sortable th-name"  data-col="name">종목명 <span class="sort-icon"></span></th>
              <th class="sortable th-num"   data-col="price">현재가 <span class="sort-icon"></span></th>
              <th class="sortable th-num"   data-col="change">전일비 <span class="sort-icon"></span></th>
              <th class="sortable th-num"   data-col="changeRate">등락률 <span class="sort-icon"></span></th>
              <th class="sortable th-num"   data-col="volume">거래량 <span class="sort-icon"></span></th>
              <th class="sortable th-num"   data-col="tradingVal">거래대금 <span class="sort-icon"></span></th>
              <th class="sortable th-num"   data-col="marketCap">시가총액 <span class="sort-icon"></span></th>
            </tr>
          </thead>
          <tbody id="stockTableBody">
            <tr><td colspan="8" class="table-placeholder">
              <div class="loading-wrap">
                <div class="spinner"></div>
                <span>데이터 로딩 중...</span>
              </div>
            </td></tr>
          </tbody>
        </table>
      </div>
      <div class="pagination" id="pagination"></div>
    </section>

  </div>

  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
